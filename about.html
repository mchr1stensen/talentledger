<style>
  :root {
    --amber:#E8610A; --amber-deep:#C44E05; --amber-light:#F5884A; --amber-pale:#FDF0E8;
    --charcoal:#1C1C1C; --slate:#3D3D3D; --mid:#6B6B6B; --stone:#B5AFA9;
    --fog:#F2EDE8; --white:#FAFAF8;
    --font-display:'Syne',sans-serif; --font-body:'DM Sans',sans-serif;
  }
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--charcoal); color:var(--white); font-family:var(--font-body); min-height:100vh; display:flex; flex-direction:column; }

  nav {
    display:flex; align-items:center; justify-content:space-between;
    padding:0 64px; height:72px;
    background:rgba(28,28,28,0.97);
    border-bottom:1px solid rgba(255,255,255,0.05);
  }
  .nav-logo { font-family:var(--font-display); font-weight:800; font-size:20px; color:var(--white); text-decoration:none; }
  .nav-logo span { color:var(--amber); }
  .nav-back { font-size:13.5px; color:var(--stone); text-decoration:none; display:flex; align-items:center; gap:8px; transition:color 0.2s; }
  .nav-back:hover { color:var(--white); }

  .page {
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:80px 32px; text-align:center; position:relative; overflow:hidden;
  }
  .page::before {
    content:''; position:absolute; top:-100px; right:-100px;
    width:500px; height:500px; border-radius:50%;
    background:radial-gradient(circle, rgba(232,97,10,0.12) 0%, transparent 70%);
  }
  .page::after {
    content:''; position:absolute; bottom:-80px; left:-80px;
    width:350px; height:350px; border-radius:50%;
    background:radial-gradient(circle, rgba(232,97,10,0.07) 0%, transparent 70%);
  }

  .inner { position:relative; z-index:2; max-width:580px; }

  .page-label {
    font-size:10px; font-weight:500; letter-spacing:0.22em; text-transform:uppercase;
    color:var(--amber-light); margin-bottom:24px;
    display:flex; align-items:center; justify-content:center; gap:10px;
  }
  .page-label::before { content:''; display:inline-block; width:24px; height:1px; background:var(--amber); }
  .page-label::after  { content:''; display:inline-block; width:24px; height:1px; background:var(--amber); }

  h1 {
    font-family:var(--font-display); font-weight:800;
    font-size:clamp(36px, 5vw, 60px); line-height:1.05;
    letter-spacing:-0.02em; color:var(--white); margin-bottom:24px;
  }
  h1 em { font-style:normal; color:var(--amber); }

  p {
    font-size:18px; font-weight:300; color:var(--stone);
    line-height:1.75; margin-bottom:48px;
  }
  p strong { color:var(--white); font-weight:400; }

  .cta {
    display:inline-block; background:var(--amber); color:var(--white);
    font-family:var(--font-body); font-size:15px; font-weight:500;
    padding:14px 36px; border-radius:4px; text-decoration:none;
    transition:background 0.2s, transform 0.15s;
  }
  .cta:hover { background:var(--amber-deep); transform:translateY(-1px); }

  footer {
    padding:24px 64px; border-top:1px solid rgba(255,255,255,0.05);
    display:flex; justify-content:space-between; align-items:center;
  }
  .footer-logo { font-family:var(--font-display); font-weight:800; font-size:16px; color:var(--white); text-decoration:none; }
  .footer-logo span { color:var(--amber); }
  .footer-note { font-size:12px; color:rgba(181,175,169,0.35); font-weight:300; }

  @media (max-width:600px) {
    nav { padding:0 24px; }
    .page { padding:60px 24px; }
    footer { padding:20px 24px; flex-direction:column; gap:10px; text-align:center; }
  }
</style>
</head>
<body>

    <a href="index.html#contact" class="cta">Get in touch →</a>
  </div>
</div>

<footer>
  <a href="index.html" class="footer-logo"><span>Talent</span> Ledger</a>
  <p class="footer-note">© 2025 Talent Ledger. Melbourne, Australia.</p>
</footer>

</body>
